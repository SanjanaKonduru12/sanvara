server:
  port: ${PORT:8081}

spring:
  # Exclude data source if strictly requested, BUT this will break Repositories. 
  # Instead, we use H2 in-memory database which is already in your pom.xml!
  datasource:
    url: jdbc:h2:mem:luminamart;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:lumina-mart-demo-secret-key-lumina-mart-demo-secret-key}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://sanvara-ecommerce-1.onrender.com}
