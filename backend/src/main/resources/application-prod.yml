spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:luminamart;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      initialization-fail-timeout: -1
  jpa:
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://luminamart-frontend-production.up.railway.app}
