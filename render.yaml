services:
  - type: web
    name: luminamart-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.MySQLDialect
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://luminamart-frontend-production.up.railway.app"

  - type: web
    name: luminamart-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://luminamart-backend-production.up.railway.app"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
