services:
  - type: web
    name: luminamart-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.MySQLDialect
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://sanvara-ecommerce-1.onrender.com"

  - type: web
    name: luminamart-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this in Render Dashboard to: https://<your-backend-url>.onrender.com/api
      - key: REACT_APP_API_URL
        sync: false # Set this in Render Dashboard to: https://<your-backend-url>.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
